services:
  postgres:
    image: postgres:16
    container_name: skyup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skyup
      POSTGRES_USER: skyup
      POSTGRES_PASSWORD: skyup
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyup -d skyup"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: skyup-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      PY_ENV: dev
      DATABASE_URL: postgresql+psycopg://skyup:skyup@postgres:5432/skyup
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic upgrade head &&
            uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000"
    develop:
      watch:
        - action: sync
          path: ./backend/app
          target: /app/app
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
        - action: rebuild
          path: ./backend/Dockerfile

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: skyup-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml
        - action: rebuild
          path: ./frontend/Dockerfile

volumes:
  postgres_data:
